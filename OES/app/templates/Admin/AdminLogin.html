{% extends 'Admin/Admin_Base_Login.html' %}




{% block body %}

   <div>
 <div class="card shadow-lg p-4" style="width: 100%; max-width: 400px; margin-left: 500px; margin-top: 100px;">
   <h3 class="text-center text-primary mb-4">Admin Login</h3>
    <form method="post">
      {% csrf_token %}
       <div class="mb-3"> 
        <label for="usernameInput" class="form-label">Username</label>
         <input type="text" class="form-control" name="name" id="usernameInput" placeholder="Enter your username">
          <div class="form-text">We'll never share your username with anyone else.</div>
         </div>
       <div class="mb-3"> 
        <label for="passwordInput" class="form-label">Password</label>
         <input type="password" class="form-control" name="password" id="passwordInput" placeholder="Enter your password"> 
        </div>
         <div class="mb-3 form-check"> 
          <input type="checkbox" class="form-check-input" id="rememberCheck">
           <label class="form-check-label" for="rememberCheck">Remember me</label> 
          </div>
           <button type="submit" class="btn btn-primary w-100">Login</button> 
          </form>
  </div> 



  </div>


  

{% endblock %}
