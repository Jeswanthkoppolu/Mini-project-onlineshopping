{% extends 'Admin/Admin_Base.html' %}

{% block body %}

<div class="container mt-5">
  <u><h2 class="text-center mb-4">update Info Page</h2></u>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="mb-3 row"> 
      <label for="productCategory" class="col-sm-2 col-form-label">Product_Id</label> 
      <div class="col-sm-10">
         <input type="text" class="form-control" name="product_Id" id="productCategory" name="productCategory" placeholder="Enter category name"> 
        </div>
     </div>
    <div class="mb-3 row">
      <label for="productName" class="col-sm-2 col-form-label">Product Name</label>
      <div class="col-sm-10">
        <input type="text" class="form-control" name="name" id="productName" placeholder="Enter product name">
      </div>
    </div>

    <div class="mb-3 row">
      <label for="productAmount" class="col-sm-2 col-form-label">Product Amount</label>
      <div class="col-sm-10">
        <input type="number" class="form-control" name="amount" id="productAmount" placeholder="Enter amount">
      </div>
    </div>

    <div class="mb-3 row">
      <label for="productImage" class="col-sm-2 col-form-label">Product Image</label>
      <div class="col-sm-10">
        <input class="form-control" name="image" type="file" id="productImage">
      </div>
    </div>

    <div class="mb-3 row">
      <label for="productInfo" class="col-sm-2 col-form-label">Product Information</label>
      <div class="col-sm-10">
        <textarea class="form-control" name="text" id="productInfo" rows="4" placeholder="Enter product details"></textarea>
      </div>
    </div>

<div class="text-center">
     <button type="submit" name="update" class="btn btn-success me-2">update</button> 
      <button type="submit" name="delete" class="btn btn-danger me-2">delete</button> 
</div>




</form>
</div>


{% endblock %}
