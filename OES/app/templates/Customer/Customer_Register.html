{% extends 'Admin/Admin_Base_Login.html' %}

{% block body %}

<div class="card shadow-lg p-4" style="width: 100%; max-width: 400px; margin-left: 500px; margin-top: 100px;">
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }} py-2" role="alert">{{ message }}</div>
    {% endfor %}
{% endif %}
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="mb-3"> 
        <label for="usernameInput" class="form-label">Username</label>
         <input type="text" name='name' class="form-control" id="usernameInput" placeholder="Enter your username" required>
    </div>
    <div class="mb-3"> 
        <label for="passwordInput" class="form-label">Password</label>
         <input type="password" name="password" class="form-control" id="passwordInput" placeholder="Enter your password" required> 
    </div>
    <div class="mb-3">
  <label for="formFile" class="form-label">Default file input example</label>
  <input class="form-control" name="image" type="file" id="formFile">
    </div>

    <div class="mb-3"> 
        <label for="usernameInput" class="form-label">Email</label>
         <input type="email" name="email" class="form-control" id="usernameInput" placeholder="Enter your Email" required>
    </div>
    <div class="mb-3"> 
        <label for="passwordInput" class="form-label">Phone Number</label>
         <input type="text" name="phonenumber" class="form-control" id="passwordInput" placeholder="Enter your phone Number" required> 
    </div>
    <div style="display:flex;">
           <button type="submit" name="submit" class="btn btn-primary w-100">Register</button> 
           <a class="btn btn-info w-100" href="{% url 'Customer_Login' %}">Go Back Login</a>
    </div>
</form>

</div>

{% endblock %}
