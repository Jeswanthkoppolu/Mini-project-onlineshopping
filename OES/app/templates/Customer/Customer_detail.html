{% extends 'Customer/Customer_Base.html' %}

{% block body %}
<section class="container-fluid py-2">
  <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
    <h3 class="mb-2 mb-md-0">Profile Settings</h3>
    <a class="btn btn-outline-primary" href="{% url 'Customer_Dashboard' %}">Back to Dashboard</a>
  </div>

  <div class="row g-4">
    <div class="col-lg-4">
      <div class="card border-0 shadow-sm rounded-4 p-3 text-center">
        {% if user.U_Image %}
        <img src="{{ user.U_Image.url }}" class="img-fluid rounded-4" alt="Profile Image" style="max-height: 320px; object-fit: cover;">
        {% else %}
        <div class="rounded-4 d-flex align-items-center justify-content-center bg-light text-secondary" style="height: 320px;">No profile image</div>
        {% endif %}
        <h5 class="mt-3 mb-1">{{ user.U_Name }}</h5>
        <p class="text-muted mb-0">{{ user.U_Email }}</p>
      </div>
    </div>

    <div class="col-lg-8">
      <div class="card border-0 shadow-sm rounded-4 p-4">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" name="name" value="{{ user.U_Name }}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Password</label>
              <input type="text" class="form-control" name="password" placeholder="Enter new password">
            </div>
            <div class="col-12">
              <label class="form-label">Profile Image</label>
              <input class="form-control" name="image" type="file">
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" value="{{ user.U_Email }}" name="email" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone Number</label>
              <input type="text" class="form-control" value="{{ user.U_PoneNumber }}" name="phonenumber" required>
            </div>
            <div class="col-12 d-grid d-md-flex gap-2">
              <button class="btn btn-success" type="submit">Save Changes</button>
              <a href="{% url 'Order_Detail' %}" class="btn btn-outline-dark">View Orders</a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
