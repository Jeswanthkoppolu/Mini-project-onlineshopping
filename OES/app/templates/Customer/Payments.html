{% extends 'Customer/Customer_Base.html' %}

{% block body %}
<section class="container-fluid py-2">
  <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 text-center" style="max-width: 700px; margin: 0 auto;">
    <h2 class="text-success mb-3">Order Placed Successfully</h2>
    <p class="text-muted mb-4">Your payment was processed and your order is confirmed.</p>

    <div class="row g-3 text-start">
      <div class="col-md-6">
        <div class="border rounded-3 p-3 h-100">
          <div class="text-muted small">Product</div>
          <div class="fw-semibold">{{ Name }}</div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="border rounded-3 p-3 h-100">
          <div class="text-muted small">Total Amount</div>
          <div class="fw-semibold">Rs {{ Amount }}</div>
        </div>
      </div>
    </div>

    <div class="d-grid d-md-flex gap-2 justify-content-center mt-4">
      <a class="btn btn-primary" href="{% url 'Order_Detail' %}">View Orders</a>
      <a class="btn btn-outline-dark" href="{% url 'Customer_Dashboard' %}">Back to Dashboard</a>
    </div>
  </div>
</section>
{% endblock %}
